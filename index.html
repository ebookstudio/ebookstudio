<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/vite.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="theme-color" content="#09090b" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="description" content="EbookStudio - The professional sanctuary for high-fidelity literature. Professional authorship and publishing platform." />
  <meta property="og:title" content="EbookStudio | Professional Authorship Platform" />
  <meta property="og:description" content="Write, publish, and sell high-fidelity books with advanced AI collaboration in a premium professional environment." />
  <meta property="og:type" content="website" />
  <meta name="twitter:card" content="summary_large_image" />
  <title>EbookStudio | Professional Authorship Platform</title>
  
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://checkout.razorpay.com/v1/checkout.js"></script>
  <style>
    :root {
      color-scheme: dark;
    }
    
    body {
      padding-bottom: env(safe-area-inset-bottom);
      background-color: #09090b;
      margin: 0;
      -webkit-tap-highlight-color: transparent;
    }

    /* Selection Aesthetics */
    ::selection {
      background: rgba(255, 255, 255, 0.1);
      color: white;
    }

    /* Hide scrollbar for immersive experience */
    .no-scrollbar::-webkit-scrollbar { display: none; }
    .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

    /* Custom Scrollbar */
    .custom-scrollbar::-webkit-scrollbar {
      width: 4px;
      height: 4px;
    }
    .custom-scrollbar::-webkit-scrollbar-track {
      background: transparent;
    }
    .custom-scrollbar::-webkit-scrollbar-thumb {
      background-color: rgba(255, 255, 255, 0.05);
      border-radius: 10px;
    }
    .custom-scrollbar::-webkit-scrollbar-thumb:hover {
      background-color: rgba(255, 255, 255, 0.1);
    }
  </style>
</head>
<body class="antialiased bg-zinc-950 text-zinc-100">
  <div id="root"></div>
  <script type="module" src="./index.tsx"></script>
</body>
</html>
